<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTC Wallet - Notoriety Coin Portal & Cyber Dashboard</title>
  
  <!-- Tailwind CSS para design cyberpunk moderno -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- CDNs via Cloudflare (cdnjs) - Ultra estáveis e de alta performance -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.321.0/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>
  
  <!-- Config do Backend NTC (Opcional) -->
  <script src="./config.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@500;600;700&display=swap');
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: #06060c;
    }

    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }

    /* Animações de brilho e pulso */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 12s linear infinite;
    }

    /* Scrollbar cyberpunk */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0b0b14;
    }
    ::-webkit-scrollbar-thumb {
      background: #25103c;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #db2777;
    }
  </style>

  <!-- Escudo de Erros Global para diagnosticar falhas de inicialização -->
  <script>
    window.addEventListener('error', function(event) {
      const root = document.getElementById('root');
      if (root && (!root.children || root.children.length === 0)) {
        root.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-6 bg-[#06060c] text-white">
            <div class="max-w-md w-full bg-[#0c0c16] border border-red-500/50 rounded-2xl p-6 shadow-xl">
              <h3 class="text-xl font-bold text-red-400 font-orbitron mb-2">Falha crítica de inicialização</h3>
              <pre class="bg-black/50 p-4 rounded-xl border border-red-950 overflow-x-auto text-xs text-red-300 mb-4 whitespace-pre-wrap">${event.message || 'Erro de compilação ou script externo.'}</pre>
              <button onclick="window.location.reload()" class="w-full py-2 bg-red-600 hover:bg-red-500 rounded-xl transition">Tentar Novamente</button>
            </div>
          </div>
        `;
      }
    });
  </script>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">

  <!-- Container principal do React -->
  <div id="root" class="flex-grow flex flex-col"></div>

  <!-- Carregamento Modular do Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, addDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseSDK = {
      initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
      getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, addDoc, getDocs, deleteDoc
    };

    // Avisa ao sistema que os SDKs carregaram
    window.dispatchEvent(new Event('firebase-sdk-loaded'));
  </script>

  <!-- Script da aplicação React -->
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const MNEMONIC_WORDS = [
      "matrix", "net", "cyber", "token", "neon", "flow", "delta", "fusion", 
      "protocol", "node", "quantum", "sync", "hash", "link", "grid", "shield", 
      "code", "engine", "plasma", "vortex", "acelera", "notoriety", "glow", "wallet"
    ];

    const SHOP_ITEMS = {
      neonThemes: { price: 5.0, label: "Temas Neon Customizados", desc: "Mude a cor principal de todos os glows do app." },
      socialCards: { price: 2.0, label: "Widgets do Insta & TikTok", desc: "Exiba e edite suas redes sociais diretamente." },
      youtubePlayer: { price: 10.0, label: "Player de Música YouTube", desc: "Ouça batidas lofi e tracks direto no painel." },
      qqFrevo: { price: 15.0, label: "QQFrevo Event Locator", desc: "Buscador de resenhas e frevos em Pernambuco." },
      resenhasOrganizer: { price: 8.0, label: "Organizador de Resenhas", desc: "Gerencie convidados, insumos e finanças de festas." },
      notes: { price: 3.0, label: "Mural de Notas Rápidas", desc: "Crie post-its de recados neon na sua tela." },
      calendar: { price: 4.0, label: "Calendário Interativo", desc: "Visualize o fluxo das suas datas importantes." },
      drinksPromo: { price: 12.0, label: "Promoção de Bebidas", desc: "Acesse promoções e use NTC para resgatar cupons." },
      fusionEngine: { price: 10.0, label: "Desbloqueio Reator de Fusão", desc: "Habilita o motor ultra de 15 NTC por hora." }
    };

    function App() {
      // --- SISTEMA E CONEXÃO ---
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [isOfflineMode, setIsOfflineMode] = useState(false);
      const [showConfigModal, setShowConfigModal] = useState(false);
      const [customConfigInput, setCustomConfigInput] = useState('');
      const [firebaseError, setFirebaseError] = useState('');
      
      const [firebaseInstance, setFirebaseInstance] = useState(null);
      const [fbUser, setFbUser] = useState(null); 

      // --- ESTADOS DA CARTEIRA & USUÁRIO ---
      const [user, setUser] = useState(null); 
      const [walletAddress, setWalletAddress] = useState('');
      const [balance, setBalance] = useState(0.00);
      const [history, setHistory] = useState([]);
      const [activeTab, setActiveTab] = useState('auth'); 
      const [syncedCloud, setSyncedCloud] = useState(false);

      // Envio de moedas com validação em tempo real
      const [sendTargetAddress, setSendTargetAddress] = useState('');
      const [sendAmount, setSendAmount] = useState('');
      const [targetUserFound, setTargetUserFound] = useState(null); 
      const [isValidatingAddress, setIsValidatingAddress] = useState(false);

      // Autenticação Segura por Frase Semente
      const [authMode, setAuthMode] = useState('login'); 
      const [seedPhraseInput, setSeedPhraseInput] = useState('');
      const [generatedSeed, setGeneratedSeed] = useState('');
      const [username, setUsername] = useState('');
      const [authError, setAuthError] = useState('');

      // Toast de notificações
      const [toast, setToast] = useState(null);

      // --- ESTADOS DO FARM ---
      const [isSpinning, setIsSpinning] = useState(false);
      const [spinCooldown, setSpinCooldown] = useState(0);
      const [spinResult, setSpinResult] = useState(null);
      const spinRotation = useRef(0);

      const [engines, setEngines] = useState({
        solar: { active: false, timeLeft: 0, duration: 5 * 60, reward: 0.5, accumulated: 0, label: "NTC Solar Harvester" },
        quantum: { active: false, timeLeft: 0, duration: 30 * 60, reward: 4.0, accumulated: 0, label: "Quantum Engine" },
        fusion: { active: false, timeLeft: 0, duration: 60 * 60, reward: 15.0, accumulated: 0, label: "Fusion NTC Reactor" }
      });

      // --- ESTADOS DE CUSTOMIZAÇÃO CYBER ---
      const [unlockedFeatures, setUnlockedFeatures] = useState({
        neonThemes: false,
        socialCards: false,
        youtubePlayer: false,
        qqFrevo: false,
        resenhasOrganizer: false,
        notes: false,
        calendar: false,
        drinksPromo: false,
        fusionEngine: false
      });

      const [activeNeon, setActiveNeon] = useState('purple'); 
      const [profileBio, setProfileBio] = useState('Nômade da Rede AceleraNet e Minerador de NTC.');
      const [socialLinks, setSocialLinks] = useState({ insta: '', tiktok: '' });
      const [youtubeId, setYoutubeId] = useState('5qap5aO4i9A'); 
      const [youtubeInput, setYoutubeInput] = useState('https://www.youtube.com/watch?v=5qap5aO4i9A');
      const [notesList, setNotesList] = useState([]);
      const [newNoteText, setNewNoteText] = useState('');
      const [parties, setParties] = useState([]);

      // --- MURAL DE RELATOS ---
      const [homeReviews, setHomeReviews] = useState([]);
      const [newReview, setNewReview] = useState({
        title: '',
        host: '',
        vibe: 5,
        reviewText: '',
        consented: false
      });

      // --- SEO ---
      const [seoAuths, setSeoAuths] = useState({
        googleCrawler: false,
        openGraph: false,
        analyticsTracker: false
      });

      // --- ESTADOS DE INTEGRAÇÃO EXTERNA (MESSAGING API) ---
      const [pendingRequests, setPendingRequests] = useState([]);

      // --- GERADOR EMBED ---
      const [embedType, setEmbedType] = useState('send');
      const [embedWallet, setEmbedWallet] = useState('');
      const [embedAmount, setEmbedAmount] = useState('1.0');

      // Paletas Cyber Neon
      const neonClasses = {
        purple: { border: 'border-purple-500/50', glow: 'shadow-[0_0_15px_rgba(167,139,250,0.4)]', text: 'text-purple-400', bg: 'bg-purple-600', shadow: 'rgba(167, 139, 250, 0.3)', bgTo: 'from-purple-950/80 to-indigo-950/80', hoverBg: 'hover:bg-purple-500' },
        pink: { border: 'border-pink-500/50', glow: 'shadow-[0_0_15px_rgba(236,72,153,0.4)]', text: 'text-pink-400', bg: 'bg-pink-600', shadow: 'rgba(236, 72, 153, 0.4)', bgTo: 'from-pink-950/80 to-rose-950/80', hoverBg: 'hover:bg-pink-500' },
        green: { border: 'border-emerald-500/50', glow: 'shadow-[0_0_15px_rgba(34,197,94,0.4)]', text: 'text-emerald-400', bg: 'bg-emerald-600', shadow: 'rgba(34, 197, 94, 0.4)', bgTo: 'from-emerald-950/80 to-teal-950/80', hoverBg: 'hover:bg-emerald-500' },
        cyan: { border: 'border-cyan-500/50', glow: 'shadow-[0_0_15px_rgba(6,182,212,0.4)]', text: 'text-cyan-400', bg: 'bg-cyan-600', shadow: 'rgba(6,182,212,0.4)', bgTo: 'from-cyan-950/80 to-blue-950/80', hoverBg: 'hover:bg-cyan-500' },
        gold: { border: 'border-amber-500/50', glow: 'shadow-[0_0_15px_rgba(245,158,11,0.4)]', text: 'text-amber-400', bg: 'bg-amber-600', shadow: 'rgba(245,158,11,0.4)', bgTo: 'from-amber-950/80 to-yellow-950/80', hoverBg: 'hover:bg-amber-500' }
      };

      const currentNeon = neonClasses[activeNeon] || neonClasses.purple;

      // --- BOOTSTRAP DE INICIALIZAÇÃO DO FIREBASE ---
      const tryInitFirebase = (configToUse = null) => {
        try {
          if (!window.FirebaseSDK) return false;

          let cfg = configToUse;
          if (!cfg) {
            const savedConfig = localStorage.getItem('ntc_custom_firebase_config');
            if (savedConfig) {
              cfg = JSON.parse(savedConfig);
            } else {
              cfg = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            }
          }

          if (!cfg || cfg.apiKey === "mock-api-key") {
            setIsOfflineMode(true);
            setFirebaseReady(true);
            return false;
          }

          const sdk = window.FirebaseSDK;
          const appInstance = sdk.initializeApp(cfg);
          const dbInstance = sdk.getFirestore(appInstance);
          const authInstance = sdk.getAuth(appInstance);
          const appIdInstance = typeof __app_id !== 'undefined' ? __app_id : 'ntc-wallet-farm-cyber';

          setFirebaseInstance({
            db: dbInstance,
            auth: authInstance,
            appId: appIdInstance,
            sdk: sdk
          });

          setIsOfflineMode(false);
          setFirebaseReady(true);
          return true;
        } catch (e) {
          console.error("Falha ao instanciar Firebase real:", e);
          setIsOfflineMode(true);
          setFirebaseReady(true);
          return false;
        }
      };

      // Carrega os SDKs e inicializa o Firebase
      useEffect(() => {
        const onSdkLoaded = () => {
          tryInitFirebase();
        };

        if (window.FirebaseSDK) {
          tryInitFirebase();
        } else {
          window.addEventListener('firebase-sdk-loaded', onSdkLoaded);
        }
        return () => window.removeEventListener('firebase-sdk-loaded', onSdkLoaded);
      }, []);

      // REGRA 3 - Autenticação imediata em background se as chaves forem reais
      useEffect(() => {
        if (isOfflineMode || !firebaseInstance) return;

        const { auth, sdk } = firebaseInstance;

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await sdk.signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await sdk.signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Erro na autenticação primária do Firebase:", e);
          }
        };

        initAuth();

        const unsubscribe = sdk.onAuthStateChanged(auth, (user) => {
          setFbUser(user);
        });

        return () => unsubscribe();
      }, [firebaseInstance, isOfflineMode]);

      // --- ESCUTA CONEXÕES EXTERNAS (GAMES / WEB-APPS) ---
      useEffect(() => {
        const handleExternalMessage = (event) => {
          const { data } = event;
          if (!data || data.source !== 'NTC_PARTNER_SITE') return;

          if (data.type === 'REQUEST_CONNECTION') {
            setPendingRequests(prev => [...prev, {
              id: data.requestId,
              origin: event.origin,
              type: 'connect',
              title: 'Solitação de Conexão à Carteira',
              desc: `O site ${event.origin} deseja ler seu endereço de carteira NTC para conectar a conta.`,
              sourceWindow: event.source
            }]);
          } else if (data.type === 'REQUEST_TRANSACTION') {
            const amount = parseFloat(data.amount);
            const isDebit = data.txType === 'SPEND'; // SPEND = Debitar, EARN = Creditar
            
            setPendingRequests(prev => [...prev, {
              id: data.requestId,
              origin: event.origin,
              type: 'transaction',
              txType: data.txType || 'EARN',
              title: isDebit ? 'Autorizar Débito / Compra' : 'Autorizar Crédito / Recompensa',
              desc: isDebit 
                ? `O site ${event.origin} quer cobrar ${amount} NTC de você pelo serviço/item "${data.label || 'Item de Jogo'}".`
                : `O site ${event.origin} quer te dar uma recompensa de ${amount} NTC em jogo por "${data.label || 'Conquista'}".`,
              amount: amount,
              label: data.label || 'Transação Externa',
              sourceWindow: event.source
            }]);
          }
        };

        window.addEventListener('message', handleExternalMessage);
        return () => window.removeEventListener('message', handleExternalMessage);
      }, [user, balance, walletAddress]);

      // --- VALIDAR ENDEREÇO DE ENVIO EM TEMPO REAL ---
      useEffect(() => {
        if (!sendTargetAddress) {
          setTargetUserFound(null);
          return;
        }

        const cleanAddress = sendTargetAddress.trim();
        if (cleanAddress.length < 10) return;

        setIsValidatingAddress(true);
        const delayDebounce = setTimeout(async () => {
          if (isOfflineMode) {
            // Valida localmente
            let found = null;
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (key.startsWith('ntc_offline_user_')) {
                const uData = JSON.parse(localStorage.getItem(key));
                if (uData.address === cleanAddress) {
                  found = uData;
                  break;
                }
              }
            }
            if (found) {
              setTargetUserFound({ username: found.username, uid: 'offline' });
            } else {
              setTargetUserFound(null);
            }
            setIsValidatingAddress(false);
          } else if (firebaseInstance && fbUser) {
            try {
              const { db, sdk, appId } = firebaseInstance;
              // REGRA 1 e REGRA 2 - Leitura direta do documento de registro público de endereços
              const regRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'addressRegistry', cleanAddress);
              const snap = await sdk.getDoc(regRef);

              if (snap.exists()) {
                setTargetUserFound({ username: snap.data().username, uid: snap.data().uid });
              } else {
                setTargetUserFound(null);
              }
            } catch (err) {
              console.error("Erro ao validar endereço público:", err);
            } finally {
              setIsValidatingAddress(false);
            }
          }
        }, 600);

        return () => clearTimeout(delayDebounce);
      }, [sendTargetAddress, firebaseInstance, fbUser, isOfflineMode]);

      // --- PROTOCOLO DE REIVINDICAÇÃO DE TRANSFERÊNCIAS EM TEMPO REAL (INFLOW CLAIMS) ---
      useEffect(() => {
        if (!firebaseReady || !user) return;

        if (isOfflineMode) {
          // No modo simulado, checa transferências pendentes para si mesmo a cada 4 segundos
          const claimInterval = setInterval(() => {
            const list = JSON.parse(localStorage.getItem('ntc_offline_pending_transfers')) || [];
            const mine = list.filter(t => t.toAddress === walletAddress && !t.claimed);

            if (mine.length > 0) {
              let addedAmount = 0;
              const newTxs = [];
              mine.forEach(t => {
                t.claimed = true;
                addedAmount += t.amount;
                newTxs.push({
                  id: t.id,
                  type: `Recebido de @${t.fromUser}`,
                  amount: t.amount,
                  date: new Date().toLocaleString()
                });
              });

              // Salva lista atualizada de transferências
              localStorage.setItem('ntc_offline_pending_transfers', JSON.stringify(list));

              const nextBalance = Number((balance + addedAmount).toFixed(4));
              const nextHistory = [...newTxs, ...history];

              setBalance(nextBalance);
              setHistory(nextHistory);
              pushStateToCloud(nextBalance, nextHistory);
              showToastMessage(`Você recebeu +${addedAmount.toFixed(2)} NTC!`);
            }
          }, 3000);

          return () => clearInterval(claimInterval);
        } else if (firebaseInstance && fbUser) {
          const { db, sdk, appId } = firebaseInstance;
          // REGRA 1 e 2 - Escuta a coleção pública de transferências pendentes
          const transfersCol = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'transfers');
          const q = sdk.query(transfersCol);

          const unsubscribe = sdk.onSnapshot(q, async (snapshot) => {
            let addedAmount = 0;
            const claims = [];
            const newHistoryEntries = [];

            snapshot.forEach((changeDoc) => {
              const data = changeDoc.data();
              // Filtra na memória para respeitar a REGRA 2 (sem queries complexas)
              if (data.toAddress === walletAddress && !data.claimed) {
                addedAmount += data.amount;
                claims.push(changeDoc.ref);
                newHistoryEntries.push({
                  id: changeDoc.id,
                  type: `Recebido de @${data.fromUser}`,
                  amount: data.amount,
                  date: new Date().toLocaleString()
                });
              }
            });

            if (claims.length > 0) {
              // Marca as transferências como claimed
              for (let ref of claims) {
                await sdk.updateDoc(ref, { claimed: true });
              }

              const nextBalance = Number((balance + addedAmount).toFixed(4));
              const nextHistory = [...newHistoryEntries, ...history];

              setBalance(nextBalance);
              setHistory(nextHistory);
              await pushStateToCloud(nextBalance, nextHistory);
              showToastMessage(`Você recebeu +${addedAmount.toFixed(2)} NTC em tempo real!`);
            }
          }, (err) => console.error("Erro na escuta das transferências:", err));

          return () => unsubscribe();
        }
      }, [firebaseReady, user, isOfflineMode, firebaseInstance, fbUser, balance, history]);

      // --- REALIZAR TRANSFERÊNCIA REAL (P2P) ---
      const handleRealTransfer = async (e) => {
        e.preventDefault();
        const amount = parseFloat(sendAmount);
        if (!targetUserFound) {
          showToastMessage("Destinatário inválido ou não selecionado.", "error");
          return;
        }
        if (isNaN(amount) || amount <= 0) {
          showToastMessage("Insira um valor de envio válido.", "error");
          return;
        }
        if (balance < amount) {
          showToastMessage("Saldo NTC insuficiente para esta operação.", "error");
          return;
        }

        // Deduz saldo local imediato do remetente
        const nextBalance = Number((balance - amount).toFixed(4));
        const newTx = {
          id: 'TX-SEND-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
          type: `Enviado para @${targetUserFound.username}`,
          amount: -amount,
          date: new Date().toLocaleString()
        };
        const nextHistory = [newTx, ...history];

        setBalance(nextBalance);
        setHistory(nextHistory);

        if (isOfflineMode) {
          // Cria transferência na fila local simula
          const transfers = JSON.parse(localStorage.getItem('ntc_offline_pending_transfers')) || [];
          transfers.push({
            id: newTx.id,
            fromUser: user,
            fromAddress: walletAddress,
            toAddress: sendTargetAddress,
            amount: amount,
            claimed: false,
            timestamp: Date.now()
          });
          localStorage.setItem('ntc_offline_pending_transfers', JSON.stringify(transfers));

          pushStateToCloud(nextBalance, nextHistory);
          showToastMessage(`Transferência de ${amount} NTC iniciada com sucesso!`);
        } else {
          try {
            const { db, sdk, appId } = firebaseInstance;
            
            // Grava transferência pendente pública em nuvem
            const transfersCol = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'transfers');
            await sdk.addDoc(transfersCol, {
              fromUser: user,
              fromAddress: walletAddress,
              toAddress: sendTargetAddress,
              amount: amount,
              claimed: false,
              timestamp: Date.now()
            });

            await pushStateToCloud(nextBalance, nextHistory);
            showToastMessage(`Transferência de ${amount} NTC enviada para a rede!`);
          } catch (err) {
            console.error("Erro na transferência Firebase:", err);
            showToastMessage("Erro ao iniciar transferência em nuvem.", "error");
          }
        }

        setSendTargetAddress('');
        setSendAmount('');
        setTargetUserFound(null);
      };

      const saveCustomFirebaseConfig = (e) => {
        e.preventDefault();
        setFirebaseError('');
        try {
          const parsed = JSON.parse(customConfigInput);
          if (!parsed.apiKey || !parsed.projectId) {
            setFirebaseError('JSON inválido. Deve conter pelo menos "apiKey" e "projectId".');
            return;
          }
          localStorage.setItem('ntc_custom_firebase_config', JSON.stringify(parsed));
          const success = tryInitFirebase(parsed);
          if (success) {
            showToastMessage("Firebase configurado com sucesso!");
            setShowConfigModal(false);
            window.location.reload(); 
          } else {
            setFirebaseError('Erro de conexão com estas chaves do Firebase.');
          }
        } catch (err) {
          setFirebaseError('JSON de Configuração Inválido. Verifique vírgulas e aspas.');
        }
      };

      const clearCustomFirebaseConfig = () => {
        localStorage.removeItem('ntc_custom_firebase_config');
        localStorage.removeItem('ntc_session_uid');
        window.location.reload();
      };

      const showToastMessage = (msg, type = "success") => {
        setToast({ message: msg, type });
        setTimeout(() => setToast(null), 4000);
      };

      const generateNewSeed = () => {
        let words = [];
        for (let i = 0; i < 12; i++) {
          const randomIndex = Math.floor(Math.random() * MNEMONIC_WORDS.length);
          words.push(MNEMONIC_WORDS[randomIndex]);
        }
        return words.join(' ');
      };

      const generateAddressFromSeed = (seed) => {
        let hash = 0;
        const cleanSeed = seed.trim().toLowerCase();
        for (let i = 0; i < cleanSeed.length; i++) {
          hash = cleanSeed.charCodeAt(i) + ((hash << 5) - hash);
        }
        let hex = '';
        for (let i = 0; i < 8; i++) {
          const value = (hash >> (i * 4)) & 0xF;
          hex += value.toString(16);
        }
        return 'NTC0x' + hex.toUpperCase() + 'FC' + cleanSeed.substring(0, 3).toUpperCase();
      };

      // --- MÉTODOS DE CADASTRO E LOGIN ---
      const handleRegisterSeed = (e) => {
        e.preventDefault();
        setAuthError('');
        if (!username.trim()) {
          setAuthError('Escolha um nome de usuário.');
          return;
        }
        const seed = generateNewSeed();
        setGeneratedSeed(seed);
        setAuthMode('seed_display');
      };

      const confirmAndCreateAccount = async () => {
        const address = generateAddressFromSeed(generatedSeed);
        const defaultProfile = {
          username: username,
          seed: generatedSeed,
          address: address,
          balance: 10.00,
          unlockedFeatures: unlockedFeatures,
          activeNeon: 'purple',
          profileBio: 'Nômade digital na AceleraNet',
          socialLinks: { insta: '', tiktok: '' },
          notesList: [],
          parties: [],
          history: [{
            id: 'TX-WELCOME',
            type: 'Boas-vindas AceleraNet',
            amount: 10.00,
            date: new Date().toLocaleString()
          }]
        };

        if (isOfflineMode) {
          localStorage.setItem(`ntc_offline_user_${username}`, JSON.stringify(defaultProfile));
          localStorage.setItem('ntc_session_offline_username', username);
          
          setUser(username);
          setWalletAddress(address);
          setBalance(10.00);
          setHistory(defaultProfile.history);
          setActiveTab('dashboard');
          showToastMessage("Carteira Criada Localmente! (Simulação Ativa)");
        } else {
          try {
            if (!fbUser) {
              setAuthError('Sincronizando com o Firebase. Tente novamente em alguns segundos.');
              return;
            }

            const { db, appId, sdk } = firebaseInstance;
            const uid = fbUser.uid;

            // Salva perfil no Firestore conforme a REGRA 1
            const userDocPath = sdk.doc(db, 'artifacts', appId, 'users', uid, 'profile', 'userData');
            await sdk.setDoc(userDocPath, { ...defaultProfile, uid });

            // REGRA 1 - Grava mapeamento público da semente
            const safeSeedKey = generatedSeed.replace(/\s+/g, '_');
            const seedMappingPath = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'seedMapping', safeSeedKey);
            await sdk.setDoc(seedMappingPath, { uid });

            // REGRA 1 - Grava o endereço na base pública de registros
            const addressRegistryPath = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'addressRegistry', address);
            await sdk.setDoc(addressRegistryPath, { uid, username });

            setUser(username);
            setWalletAddress(address);
            setBalance(10.00);
            setHistory(defaultProfile.history);

            localStorage.setItem('ntc_session_uid', uid);
            setActiveTab('dashboard');
            showToastMessage("Carteira salva em nuvem no Firebase!");
          } catch (err) {
            console.error("Firebase Reg Error:", err);
            setAuthError('Erro ao registrar no Firebase. Ative o Modo Simulado local ou configure seu Firebase.');
          }
        }
      };

      const handleLoginSeed = async (e) => {
        e.preventDefault();
        setAuthError('');
        const cleanSeed = seedPhraseInput.trim().toLowerCase();
        if (!cleanSeed) {
          setAuthError('Insira sua frase semente.');
          return;
        }

        if (isOfflineMode) {
          let foundUser = null;
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('ntc_offline_user_')) {
              const uData = JSON.parse(localStorage.getItem(key));
              if (uData.seed.trim().toLowerCase() === cleanSeed) {
                foundUser = uData;
                break;
              }
            }
          }

          if (foundUser) {
            setUser(foundUser.username);
            setWalletAddress(foundUser.address);
            setBalance(foundUser.balance || 0);
            setHistory(foundUser.history || []);
            setUnlockedFeatures(foundUser.unlockedFeatures || unlockedFeatures);
            setActiveNeon(foundUser.activeNeon || 'purple');
            setProfileBio(foundUser.profileBio || '');
            setSocialLinks(foundUser.socialLinks || { insta: '', tiktok: '' });
            setNotesList(foundUser.notesList || []);
            setParties(foundUser.parties || []);
            
            localStorage.setItem('ntc_session_offline_username', foundUser.username);
            setActiveTab('dashboard');
            showToastMessage(`Sessão Simulada Restaurada: @${foundUser.username}`);
          } else {
            setAuthError('Frase semente incorreta ou nenhuma conta criada localmente.');
          }
        } else {
          try {
            if (!fbUser) {
              setAuthError('Conexão Firebase pendente. Tente novamente em breve.');
              return;
            }

            const { db, appId, sdk } = firebaseInstance;

            const safeSeedKey = cleanSeed.replace(/\s+/g, '_');
            const seedMappingRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'seedMapping', safeSeedKey);
            const mappingSnap = await sdk.getDoc(seedMappingRef);

            if (!mappingSnap.exists()) {
              setAuthError('Nenhum registro encontrado para esta Semente no Firebase.');
              return;
            }

            const resolvedUid = mappingSnap.data().uid;
            const userProfileRef = sdk.doc(db, 'artifacts', appId, 'users', resolvedUid, 'profile', 'userData');
            const profileSnap = await sdk.getDoc(userProfileRef);

            if (profileSnap.exists()) {
              const data = profileSnap.data();
              setUser(data.username);
              setWalletAddress(data.address);
              setBalance(data.balance || 0);
              setHistory(data.history || []);
              setUnlockedFeatures(data.unlockedFeatures || unlockedFeatures);
              setActiveNeon(data.activeNeon || 'purple');
              setProfileBio(data.profileBio || '');
              setSocialLinks(data.socialLinks || { insta: '', tiktok: '' });
              setNotesList(data.notesList || []);
              setParties(data.parties || []);

              localStorage.setItem('ntc_session_uid', resolvedUid);
              setActiveTab('dashboard');
              showToastMessage(`Sessão segura restaurada para @${data.username}`);
            } else {
              setAuthError('Perfil não encontrado para o UID associado.');
            }
          } catch (err) {
            console.error("Firebase Login Error:", err);
            setAuthError('Falha ao autenticar no Firebase. Tente o modo offline se necessário.');
          }
        }
      };

      // Auto-load de sessões
      useEffect(() => {
        if (!firebaseReady) return;
        
        if (isOfflineMode) {
          const savedOfflineUser = localStorage.getItem('ntc_session_offline_username');
          if (savedOfflineUser) {
            const data = JSON.parse(localStorage.getItem(`ntc_offline_user_${savedOfflineUser}`));
            if (data) {
              setUser(data.username);
              setWalletAddress(data.address);
              setBalance(data.balance || 0);
              setHistory(data.history || []);
              setUnlockedFeatures(data.unlockedFeatures || unlockedFeatures);
              setActiveNeon(data.activeNeon || 'purple');
              setProfileBio(data.profileBio || '');
              setSocialLinks(data.socialLinks || { insta: '', tiktok: '' });
              setNotesList(data.notesList || []);
              setParties(data.parties || []);
              setActiveTab('dashboard');
            }
          }
        } else if (firebaseInstance && fbUser) {
          const savedUid = localStorage.getItem('ntc_session_uid');
          if (savedUid) {
            const { db, appId, sdk } = firebaseInstance;
            const userProfileRef = sdk.doc(db, 'artifacts', appId, 'users', savedUid, 'profile', 'userData');
            sdk.getDoc(userProfileRef).then((profileSnap) => {
              if (profileSnap.exists()) {
                const data = profileSnap.data();
                setUser(data.username);
                setWalletAddress(data.address);
                setBalance(data.balance || 0);
                setHistory(data.history || []);
                setUnlockedFeatures(data.unlockedFeatures || unlockedFeatures);
                setActiveNeon(data.activeNeon || 'purple');
                setProfileBio(data.profileBio || '');
                setSocialLinks(data.socialLinks || { insta: '', tiktok: '' });
                setNotesList(data.notesList || []);
                setParties(data.parties || []);
                setActiveTab('dashboard');
              }
            }).catch(err => console.error("Erro no auto-load de sessão:", err));
          }
        }
      }, [firebaseReady, isOfflineMode, firebaseInstance, fbUser]);

      // --- SINCRONIZAÇÃO EM NUVEM OU LOCAL ---
      const pushStateToCloud = async (overrideBalance = null, overrideHistory = null, updatedUnlocked = null) => {
        const nextBal = overrideBalance !== null ? overrideBalance : balance;
        const nextHist = overrideHistory !== null ? overrideHistory : history;
        const nextUnlock = updatedUnlocked !== null ? updatedUnlocked : unlockedFeatures;

        if (isOfflineMode) {
          if (!user) return;
          const localData = JSON.parse(localStorage.getItem(`ntc_offline_user_${user}`)) || {};
          const merged = {
            ...localData,
            balance: nextBal,
            history: nextHist,
            unlockedFeatures: nextUnlock,
            activeNeon,
            profileBio,
            socialLinks,
            notesList,
            parties
          };
          localStorage.setItem(`ntc_offline_user_${user}`, JSON.stringify(merged));
          setSyncedCloud(true);
        } else if (firebaseInstance && fbUser) {
          setSyncedCloud(false);
          try {
            const { db, sdk, appId } = firebaseInstance;
            const userProfileRef = sdk.doc(db, 'artifacts', appId, 'users', fbUser.uid, 'profile', 'userData');
            
            await sdk.setDoc(userProfileRef, {
              uid: fbUser.uid,
              username: user,
              address: walletAddress,
              balance: nextBal,
              history: nextHist,
              unlockedFeatures: nextUnlock,
              activeNeon,
              profileBio,
              socialLinks,
              notesList,
              parties
            }, { merge: true });

            setSyncedCloud(true);
          } catch (err) {
            console.error("Erro ao subir dados para Firebase:", err);
          }
        }
      };

      // Dispara salvamentos automáticos
      useEffect(() => {
        if (user) {
          pushStateToCloud();
        }
      }, [activeNeon, profileBio, socialLinks, notesList, parties]);

      // --- ESCUTA MURAL DE RESENHAS EM TEMPO REAL ---
      useEffect(() => {
        if (!firebaseReady) return;

        if (isOfflineMode) {
          const localReviews = JSON.parse(localStorage.getItem('ntc_simulated_reviews')) || [];
          setHomeReviews(localReviews);
        } else if (firebaseInstance && fbUser) {
          const { db, sdk, appId } = firebaseInstance;
          const reviewsCollection = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'homeReviews');
          const q = sdk.query(reviewsCollection);

          const unsubscribe = sdk.onSnapshot(q, (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setHomeReviews(list);
          }, (err) => {
            console.error("Erro em tempo real nas avaliações do mural:", err);
          });

          return () => unsubscribe();
        }
      }, [firebaseReady, isOfflineMode, firebaseInstance, fbUser]);

      // --- SESSÃO DE GIRO ---
      const spinWheel = () => {
        if (isSpinning || spinCooldown > 0) return;
        setIsSpinning(true);
        setSpinResult(null);

        const rewards = [
          { value: 0.2, label: '0.2 NTC' },
          { value: 0.8, label: '0.8 NTC' },
          { value: 1.5, label: '1.5 NTC' },
          { value: 3.0, label: '3.0 NTC' },
          { value: 0.0, label: 'Sem ganho' },
          { value: 10.0, label: 'MEGA JACKPOT (10.0 NTC)' }
        ];

        const chosenIndex = Math.floor(Math.random() * rewards.length);
        const prize = rewards[chosenIndex];
        spinRotation.current = spinRotation.current + 1440 + (chosenIndex * 60);

        setTimeout(() => {
          setIsSpinning(false);
          setSpinResult(prize);

          if (prize.value > 0) {
            const nextBalance = Number((balance + prize.value).toFixed(4));
            const newTx = {
              id: 'TX-' + Math.random().toString(36).substr(2, 9).toUpperCase(),
              type: 'Sorte na Roleta',
              amount: prize.value,
              date: new Date().toLocaleString()
            };
            const nextHistory = [newTx, ...history];

            setBalance(nextBalance);
            setHistory(nextHistory);
            pushStateToCloud(nextBalance, nextHistory);
            showToastMessage(`Sorte! Você farmou +${prize.value} NTC.`);
          } else {
            showToastMessage("Não desista! Tente no próximo giro.", "error");
          }

          setSpinCooldown(30); 
        }, 3000);
      };

      // Timers de cooldown e mineração de motores
      useEffect(() => {
        const interval = setInterval(() => {
          setSpinCooldown(prev => (prev > 0 ? prev - 1 : 0));

          setEngines(prev => {
            let changed = false;
            const copy = { ...prev };
            Object.keys(copy).forEach(key => {
              if (copy[key].active && copy[key].timeLeft > 0) {
                copy[key].timeLeft -= 1;
                const elapsed = copy[key].duration - copy[key].timeLeft;
                copy[key].accumulated = Number(((elapsed / copy[key].duration) * copy[key].reward).toFixed(4));
                changed = true;

                if (copy[key].timeLeft === 0) {
                  copy[key].active = false;
                  copy[key].accumulated = 0;
                  triggerEnginePayout(copy[key].reward, copy[key].label);
                }
              }
            });
            return changed ? copy : prev;
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [engines, balance, history]);

      const triggerEnginePayout = (reward, label) => {
        const nextBalance = Number((balance + reward).toFixed(4));
        const newTx = {
          id: 'TX-ENG-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
          type: `Rendimento: ${label}`,
          amount: reward,
          date: new Date().toLocaleString()
        };
        const nextHistory = [newTx, ...history];
        setBalance(nextBalance);
        setHistory(nextHistory);
        pushStateToCloud(nextBalance, nextHistory);
        showToastMessage(`Farm completo do ${label}! +${reward} NTC creditados.`);
      };

      const startEngine = (key) => {
        if (engines[key].active) return;
        setEngines(prev => ({
          ...prev,
          [key]: {
            ...prev[key],
            active: true,
            timeLeft: prev[key].duration,
            accumulated: 0
          }
        }));
        showToastMessage(`Motor "${engines[key].label}" ativado com sucesso!`);
      };

      // --- COMPRA DE UPGRADES ---
      const unlockWidget = (key) => {
        const item = SHOP_ITEMS[key];
        if (!item) return;

        if (balance < item.price) {
          showToastMessage(`Balanço NTC insuficiente!`, "error");
          return;
        }

        const nextBalance = Number((balance - item.price).toFixed(4));
        const newTx = {
          id: 'TX-UPGRADE-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
          type: `Upgrade Adquirido: ${item.label}`,
          amount: -item.price,
          date: new Date().toLocaleString()
        };
        const nextHistory = [newTx, ...history];
        const nextUnlocked = { ...unlockedFeatures, [key]: true };

        setBalance(nextBalance);
        setHistory(nextHistory);
        setUnlockedFeatures(nextUnlocked);
        pushStateToCloud(nextBalance, nextHistory, nextUnlocked);
        showToastMessage(`Upgrade "${item.label}" destravado!`);
      };

      // Sticky Notes
      const addStickyNote = () => {
        if (!newNoteText.trim()) return;
        const newNote = { id: Date.now(), text: newNoteText, color: activeNeon };
        setNotesList([...notesList, newNote]);
        setNewNoteText('');
      };

      const removeStickyNote = (id) => {
        setNotesList(notesList.filter(n => n.id !== id));
      };

      // Post de Relato Consensual
      const publishHomeReview = async (e) => {
        e.preventDefault();
        if (!newReview.title || !newReview.host || !newReview.reviewText) {
          showToastMessage("Preencha todos os campos do relato.", "error");
          return;
        }
        if (!newReview.consented) {
          showToastMessage("É necessário concordar com as diretrizes de consentimento.", "error");
          return;
        }

        const reportObject = {
          title: newReview.title,
          host: newReview.host,
          vibe: parseInt(newReview.vibe),
          reviewText: newReview.reviewText,
          timestamp: new Date().toLocaleString(),
          author: user
        };

        if (isOfflineMode) {
          const list = JSON.parse(localStorage.getItem('ntc_simulated_reviews')) || [];
          const updated = [reportObject, ...list];
          localStorage.setItem('ntc_simulated_reviews', JSON.stringify(updated));
          setHomeReviews(updated);
        } else {
          try {
            if (!fbUser) {
              showToastMessage("Aguardando login no Firebase...", "error");
              return;
            }

            const { db, sdk, appId } = firebaseInstance;
            const reviewsCol = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'homeReviews');
            await sdk.addDoc(reviewsCol, reportObject);
          } catch (err) {
            console.error(err);
            showToastMessage("Falha ao salvar no Firebase.", "error");
            return;
          }
        }

        const nextBalance = Number((balance + 1.0).toFixed(4));
        const newTx = {
          id: 'TX-REVIEW-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
          type: 'Incentivo Relato Consensual',
          amount: 1.0,
          date: new Date().toLocaleString()
        };
        const nextHistory = [newTx, ...history];

        setBalance(nextBalance);
        setHistory(nextHistory);
        pushStateToCloud(nextBalance, nextHistory);

        setNewReview({ title: '', host: '', vibe: 5, reviewText: '', consented: false });
        showToastMessage("Relato de Resenha publicado com sucesso! +1.0 NTC ganho.");
      };

      // --- PROCESSAR SOLICITAÇÕES EXTERNAS DE JOGOS (REALÍSTICO) ---
      const handleApproveRequest = async (req) => {
        if (req.type === 'connect') {
          req.sourceWindow.postMessage({
            type: 'NTC_CONNECTION_RESPONSE',
            requestId: req.id,
            status: 'approved',
            address: walletAddress,
            username: user
          }, req.origin);
          showToastMessage(`Site conectado com sucesso!`);
        } else if (req.type === 'transaction') {
          const isDebit = req.txType === 'SPEND';
          
          if (isDebit && balance < req.amount) {
            showToastMessage("Saldo insuficiente para pagar o jogo!", "error");
            req.sourceWindow.postMessage({
              type: 'NTC_TRANSACTION_RESPONSE',
              requestId: req.id,
              status: 'declined',
              error: 'Saldo insuficiente.'
            }, req.origin);
            setPendingRequests(prev => prev.filter(p => p.id !== req.id));
            return;
          }

          // Realiza o ajuste real no saldo de forma Cloud ou Offline
          const change = isDebit ? -req.amount : req.amount;
          const nextBalance = Number((balance + change).toFixed(4));
          const newTx = {
            id: 'TX-EXT-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
            type: `${isDebit ? 'Débito' : 'Crédito'} via ${req.label}`,
            amount: change,
            date: new Date().toLocaleString()
          };
          const nextHistory = [newTx, ...history];

          setBalance(nextBalance);
          setHistory(nextHistory);
          await pushStateToCloud(nextBalance, nextHistory);

          req.sourceWindow.postMessage({
            type: 'NTC_TRANSACTION_RESPONSE',
            requestId: req.id,
            status: 'approved',
            txId: newTx.id,
            newBalance: nextBalance
          }, req.origin);

          showToastMessage(isDebit ? `Débito de ${req.amount} NTC concluído!` : `Recompensa de ${req.amount} NTC creditada!`);
        }

        setPendingRequests(prev => prev.filter(p => p.id !== req.id));
      };

      const handleDeclineRequest = (req) => {
        req.sourceWindow.postMessage({
          type: req.type === 'connect' ? 'NTC_CONNECTION_RESPONSE' : 'NTC_TRANSACTION_RESPONSE',
          requestId: req.id,
          status: 'declined',
          error: 'Usuário recusou a solicitação.'
        }, req.origin);

        setPendingRequests(prev => prev.filter(p => p.id !== req.id));
        showToastMessage("Solicitação externa cancelada.", "error");
      };

      const handleLogout = () => {
        localStorage.removeItem('ntc_session_uid');
        localStorage.removeItem('ntc_session_offline_username');
        setUser(null);
        setWalletAddress('');
        setBalance(0);
        setHistory([]);
        setFbUser(null);
        setActiveTab('auth');
        showToastMessage("Sessão finalizada!");
      };

      return (
        <div className="flex-grow flex flex-col justify-between">
          
          {/* Header */}
          <header class={`border-b border-purple-950/40 bg-black/80 backdrop-blur-md px-6 py-4 sticky top-0 z-40 transition-all ${currentNeon.glow}`}>
            <div className="max-w-6xl mx-auto flex justify-between items-center font-orbitron">
              <div className="flex items-center space-x-3">
                <div class={`h-10 w-10 rounded-xl bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center ${currentNeon.glow}`}>
                  <span className="font-extrabold text-xl text-white">N</span>
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-white">
                    NTC ECOSYSTEM
                  </h1>
                  <p className="text-[10px] text-purple-300/70 tracking-widest uppercase">Safe Net Portal</p>
                </div>
              </div>

              <div className="flex items-center space-x-3">
                <button 
                  onClick={() => setShowConfigModal(true)}
                  className="px-2.5 py-1.5 bg-purple-950/80 hover:bg-purple-900 border border-purple-800/40 rounded-lg text-purple-300 hover:text-white transition flex items-center space-x-1.5 text-xs font-semibold"
                  title="Configurar Conexões do Firebase"
                >
                  <i data-lucide="settings" className="w-3.5 h-3.5"></i>
                  <span>Setup Firebase</span>
                </button>

                {user && (
                  <div className="flex items-center space-x-4 text-xs font-semibold">
                    <div className="h-6 w-[1px] bg-purple-950"></div>
                    <div className="text-right">
                      <span className="text-gray-500 block uppercase">Carteira Ativa</span>
                      <span class={`${currentNeon.text}`}>@{user}</span>
                    </div>
                    {isOfflineMode ? (
                      <span className="text-yellow-500 flex items-center space-x-1" title="Modo Local Simulado (Sem Firebase)">
                        <span className="h-1.5 w-1.5 rounded-full bg-yellow-500 animate-pulse"></span>
                        <span className="hidden md:inline">Modo Local</span>
                      </span>
                    ) : fbUser ? (
                      <span className="text-green-400 flex items-center space-x-1" title="Sincronizado no Firebase">
                        <span className="h-1.5 w-1.5 rounded-full bg-green-500 animate-ping"></span>
                        <span className="hidden md:inline">Firebase Ativo</span>
                      </span>
                    ) : (
                      <span className="text-yellow-500 flex items-center space-x-1" title="Sincronizando...">
                        <i data-lucide="refresh-cw" className="w-3.5 h-3.5 animate-spin"></i>
                      </span>
                    )}
                    <button onClick={handleLogout} className="p-1.5 bg-red-950/30 text-red-400 hover:text-red-200 border border-red-900/30 rounded-lg transition">
                      Sair
                    </button>
                  </div>
                )}
              </div>
            </div>
          </header>

          {/* Modal de Solicitação Externa de Jogos */}
          {pendingRequests.length > 0 && (
            <div className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
              <div className="bg-[#0f0f1c] border-2 border-pink-500 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
                <div className="bg-gradient-to-r from-purple-900 to-pink-900 px-6 py-4 flex items-center space-x-3">
                  <div className="bg-pink-500/20 p-2 rounded-lg text-pink-400 animate-pulse">
                    <i data-lucide="shield-alert" className="w-6 h-6"></i>
                  </div>
                  <h3 className="font-orbitron font-bold text-lg text-white">Conexão Segura</h3>
